name: Deploy

# Despliegue automatizado a Vercel, encadenado tras el workflow "CI": solo
# corre si CI (quality + e2e) terminó en verde. `main` → producción; cualquier
# otra rama con CI verde (PRs) → preview. Requiere los secretos del repo:
# VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  # Comprueba si los secretos de Vercel están configurados (no son accesibles
  # en un `if` a nivel de job). Hasta que el operador los añada, el deploy se
  # omite limpiamente en vez de fallar en rojo.
  preflight:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Secretos de Vercel ausentes; se omite el despliegue (F8.2)."
          fi

  vercel:
    needs: preflight
    if: ${{ needs.preflight.outputs.configured == 'true' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "vercel_env=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "vercel_env=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.env.outputs.vercel_env }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ steps.env.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt ${{ steps.env.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}
