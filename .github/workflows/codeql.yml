name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@6e93df3c1b954c609ccb2761345ddc9dba76b649 # v3.28.1
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@6e93df3c1b954c609ccb2761345ddc9dba76b649 # v3.28.1
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@6e93df3c1b954c609ccb2761345ddc9dba76b649 # v3.28.1
